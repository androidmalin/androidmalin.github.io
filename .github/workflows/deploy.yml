name: Deploy site to Aliyun OSS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aliyun-oss
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://androidmalin.com
    env:
      OSS_BUCKET: androidmalinblog
      OSS_ENDPOINT: oss-cn-hongkong.aliyuncs.com
      OSS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID || vars.ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET || vars.ACCESS_KEY_SECRET }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Python 🐍
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Update _config.yml ⚙️
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path("_config.yml")
          text = config.read_text()
          placeholder = "  repo: # <your-github-user-name>/<your-github-repo-name>"
          replacement = "  repo: ${{ github.repository }}"

          if placeholder in text:
              text = text.replace(placeholder, replacement, 1)

          config.write_text(text)
          PY
      - name: Validate OSS credentials 🔐
        run: |
          if [ -z "${OSS_ACCESS_KEY_ID}" ] || [ -z "${OSS_ACCESS_KEY_SECRET}" ]; then
            echo "Missing ACCESS_KEY_ID or ACCESS_KEY_SECRET in the github-pages environment." >&2
            exit 1
          fi
      - name: Install system dependencies 📦
        run: sudo apt-get update && sudo apt-get install -y imagemagick unzip
      - name: Install and Build 🔧
        run: |
          pip3 install --upgrade nbconvert
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Install ossutil 🧰
        run: |
          curl -fsSL -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
          echo "dcc512e4a893e16bbee63bc769339d8e56b21744fd83c8212a9d8baf28767343  ossutil.zip" | sha256sum -c -
          unzip -q ossutil.zip
          sudo install ossutil-v1.7.19-linux-amd64/ossutil /usr/local/bin/ossutil
      - name: Configure ossutil ⚙️
        run: |
          cat > "${HOME}/.ossutilconfig" <<EOF
          [Credentials]
          language = EN
          endpoint = ${OSS_ENDPOINT}
          accessKeyID = ${OSS_ACCESS_KEY_ID}
          accessKeySecret = ${OSS_ACCESS_KEY_SECRET}
          EOF
          chmod 600 "${HOME}/.ossutilconfig"
      - name: Configure bucket website hosting 🌐
        run: |
          cat > oss-website.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <WebsiteConfiguration>
            <IndexDocument>
              <Suffix>index.html</Suffix>
              <SupportSubDir>true</SupportSubDir>
              <Type>0</Type>
            </IndexDocument>
            <ErrorDocument>
              <Key>404.html</Key>
              <HttpStatus>404</HttpStatus>
            </ErrorDocument>
          </WebsiteConfiguration>
          EOF
          ossutil website --method put "oss://${OSS_BUCKET}" oss-website.xml
      - name: Sync site to OSS 🚀
        run: ossutil sync "_site/" "oss://${OSS_BUCKET}/" --delete -f
